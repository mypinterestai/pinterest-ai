<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PinterestAI Dashboard</title>

  <link rel="stylesheet" href="../css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

</head>

<body>

  <div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="sidebar-logo">
        PinterestAI
      </div>

      <div class="sidebar-links">

        <a href="#">Dashboard</a>
        <a href="#">Keyword Research</a>
        <a href="#">Title Generator</a>
        <a href="#">Description AI</a>
        <a href="#">Pinterest Tags</a>
        <a href="#">Trend Finder</a>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="dashboard-main">

      <div class="dashboard-top">

        <h1>
          Pinterest Keyword Research
        </h1>

        <button>
          Upgrade Pro
        </button>

      </div>

      <!-- SEARCH -->

      <div class="research-box">

        <input
        type="text"
        placeholder="Enter Pinterest keyword">

        <button>
          Analyze
        </button>

      </div>

      <!-- STATS -->

      <div class="stats-grid">

        <div class="stat-card">

          <h3>Search Volume</h3>

          <p>18.4K</p>

        </div>

        <div class="stat-card">

          <h3>Competition</h3>

          <p>Medium</p>

        </div>

        <div class="stat-card">

          <h3>Trend Score</h3>

          <p>92%</p>

        </div>

      </div>

      <!-- KEYWORDS -->

      <div class="keyword-table">

        <div class="table-head">

          <span>Keyword</span>
          <span>Search Volume</span>
          <span>Competition</span>

        </div>

        <div class="table-row">

          <span>summer nails</span>
          <span>27K</span>
          <span>Low</span>

        </div>

        <div class="table-row">

          <span>summer nail ideas</span>
          <span>19K</span>
          <span>Medium</span>

        </div>

        <div class="table-row">

          <span>pink summer nails</span>
          <span>12K</span>
          <span>Low</span>

        </div>

      </div>

    </main>

  </div>

</body>

</html>
