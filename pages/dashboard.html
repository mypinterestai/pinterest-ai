
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>PinterestAI Dashboard</title>

  <link rel="stylesheet"
  href="../css/style.css">

  <link rel="preconnect"
  href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
  rel="stylesheet">

</head>

<body>

  <div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="sidebar-logo">
        PinterestAI
      </div>

      <div class="sidebar-links">

        <a href="#"
        onclick="switchTool('keyword')">
        Keyword Research
        </a>

        <a href="#"
        onclick="switchTool('title')">
        Title Generator
        </a>

        <a href="#"
        onclick="switchTool('tags')">
        Pinterest Tags
        </a>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="dashboard-main">

      <div class="dashboard-top">

        <h1>
          Pinterest Keyword Research
        </h1>

        <button>
          Upgrade Pro
        </button>

      </div>

      <!-- DYNAMIC CONTENT -->

      <div id="dynamicContent">

        <div class="tool-section">

          <div class="research-box">

            <input
            type="text"
            id="keyword"
            placeholder="Enter Pinterest keyword">

            <button onclick="generateKeywordResearch()">
              Analyze
            </button>

          </div>

          <div id="results"></div>

        </div>

      </div>

    </main>

  </div>

  <script src="../js/script.js"></script>

</body>

</html>
